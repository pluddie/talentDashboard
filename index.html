<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人才儀表板</title>
<style>
:root {
  --fs-xl:   20px;
  --fs-lg:   16px;
  --fs-md:   14px;
  --fs-sm:   12px;
  --fs-xs:   11px;
  --bg:          linear-gradient(135deg,#e8f0fe 0%,#f0f7ff 45%,#e3f0fb 100%);
  --blur1:       radial-gradient(ellipse at 20% 30%,rgba(99,155,255,.16) 0%,transparent 60%);
  --blur2:       radial-gradient(ellipse at 80% 70%,rgba(130,180,255,.12) 0%,transparent 55%);
  --glass:       rgba(255,255,255,.60);
  --glass-hdr:   rgba(255,255,255,.82);
  --glass-bdr:   rgba(255,255,255,.75);
  --page-hdr:    rgba(255,255,255,.72);
  --text:        #1a2540;
  --text-sub:    #4a5c80;
  --text-muted:  #7a90b8;
  --accent:      #2563eb;
  --accent-lt:   rgba(37,99,235,.10);
  --accent-md:   rgba(37,99,235,.18);
  --accent2:     #60a5fa;
  --divider:     rgba(37,99,235,.10);
  --hdr-title:   #1e3a6e;
}
[data-theme="dark"] {
  --bg:          linear-gradient(135deg,#0b1120 0%,#0f1a30 45%,#101828 100%);
  --blur1:       radial-gradient(ellipse at 20% 30%,rgba(37,99,235,.22) 0%,transparent 60%);
  --blur2:       radial-gradient(ellipse at 80% 70%,rgba(96,165,250,.14) 0%,transparent 55%);
  --glass:       rgba(15,25,50,.60);
  --glass-hdr:   rgba(15,25,50,.85);
  --glass-bdr:   rgba(255,255,255,.10);
  --page-hdr:    rgba(12,20,42,.80);
  --text:        #e2eafc;
  --text-sub:    #94afd4;
  --text-muted:  #5b7aa8;
  --accent:      #60a5fa;
  --accent-lt:   rgba(96,165,250,.12);
  --accent-md:   rgba(96,165,250,.22);
  --accent2:     #93c5fd;
  --divider:     rgba(96,165,250,.12);
  --hdr-title:   #93c5fd;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;
  font-family:'Segoe UI','PingFang TC','Noto Sans TC',sans-serif;
  font-size:var(--fs-md);color:var(--text)}
body{background:var(--bg);position:relative}
body::before{content:'';position:fixed;inset:0;
  background:var(--blur1),var(--blur2);pointer-events:none;z-index:0}

/* ═══ LAYOUT SHELL ═══ */
#app{position:relative;z-index:1;width:100vw;height:100vh;
  display:flex;flex-direction:column;padding:8px;gap:6px}

#page-header{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;height:44px;background:var(--page-hdr);
  backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);
  border:1px solid var(--glass-bdr);border-radius:14px;
  box-shadow:0 2px 14px rgba(37,99,235,.07);
}
#page-header-left{display:flex;align-items:baseline;gap:10px}
#page-title-zh{font-size:var(--fs-xl);font-weight:800;color:var(--hdr-title);letter-spacing:.03em}
#page-title-en{font-size:var(--fs-sm);font-weight:600;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase}
#settings-btn{width:34px;height:34px;border-radius:9px;border:none;cursor:pointer;
  background:var(--accent-lt);color:var(--accent);display:flex;align-items:center;justify-content:center;transition:background .15s}
#settings-btn:hover{background:var(--accent-md)}
#settings-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* rows — top taller, bottom shorter */
.row{display:flex;gap:6px;min-height:0}
.row-top{flex:46 1 0}
.row-bot{flex:54 1 0}

/* col widths */
.cell-intro   {flex:4;min-width:0}
.cell-rotation{flex:2.2;min-width:0}
.cell-radar   {flex:3.8;min-width:0}
.cell-org  {flex:4;min-width:0}
.cell-match{flex:6;min-width:0}

/* ═══ GLASS CARD ═══ */
.card{height:100%;background:var(--glass);
  backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);
  border:1px solid var(--glass-bdr);border-radius:14px;overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:0 4px 20px rgba(37,99,235,.06),0 1px 4px rgba(0,0,0,.04)}
.card-hdr{flex-shrink:0;display:flex;align-items:center;padding:7px 12px 6px;
  background:var(--glass-hdr);border-bottom:1px solid var(--divider)}
.card-title{font-size:var(--fs-lg);font-weight:700;color:var(--hdr-title);letter-spacing:.04em}
.card-body{flex:1;min-height:0;padding:8px 12px;overflow:hidden;display:flex;flex-direction:column;gap:0}

/* ═══ EDITABLE ═══ */
[contenteditable="true"]{outline:none;cursor:text;border-radius:4px;transition:background .15s;min-width:16px;display:inline-block}
[contenteditable="true"]:hover{background:rgba(37,99,235,.07)}
[contenteditable="true"]:focus{background:rgba(37,99,235,.12)}

.grp{display:flex;flex-direction:column;gap:3px}
.grp+.grp{margin-top:6px;padding-top:6px;border-top:1px solid var(--divider)}

/* ═══════════════════════════════
   1. 人才介紹 — no card title
   Left: photo + perf   Right: name/major/pros
═══════════════════════════════ */
/* Hide card header for intro */
.cell-intro .card-hdr { display:none; }

#intro-body{display:flex;gap:12px;flex:1;min-height:0;padding:8px 12px}

/* Left col: photo on top, perf below */
#intro-left{
  flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:8px;
  min-width:80px;
}
#profile-pic{
  width:72px;height:72px;border-radius:50%;
  background:var(--accent-lt);
  display:flex;align-items:center;justify-content:center;
  font-size:38px;cursor:pointer;
  border:2px solid var(--glass-bdr);overflow:hidden;
  transition:box-shadow .2s;flex-shrink:0;
}
#profile-pic:hover{box-shadow:0 0 0 3px var(--accent2)}
#profile-pic img{width:100%;height:100%;object-fit:cover}
#pic-input{display:none}

/* perf below photo */
#perf-block{display:flex;flex-direction:column;align-items:center;gap:4px;width:100%}
#perf-block-label{font-size:var(--fs-xs);color:var(--text-muted);font-weight:600;letter-spacing:.05em}
#perf-row{display:flex;gap:5px;align-items:flex-end;flex-wrap:wrap;justify-content:center}
.perf-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.perf-yr{font-size:var(--fs-xs);color:var(--text-muted);font-weight:600}
.perf-grade{
  font-size:var(--fs-sm);padding:2px 7px;border-radius:7px;
  border:1px solid var(--glass-bdr);background:var(--accent-lt);
  cursor:pointer;color:var(--text);font-weight:700;
  appearance:none;-webkit-appearance:none;outline:none;
}

/* Right col: name, major, org tag, pros&cons */
#intro-details{flex:1;min-width:0;display:flex;flex-direction:column;overflow:auto}
#talent-name{font-size:var(--fs-xl);font-weight:800;color:var(--accent);line-height:1.15}
#talent-major{font-size:var(--fs-md);color:var(--text-sub)}
#talent-org{
  display:inline-block;padding:2px 12px;
  background:var(--accent-lt);color:var(--accent);
  border-radius:999px;font-size:var(--fs-sm);font-weight:700;cursor:text;
}
#pc-list{display:flex;flex-direction:column;gap:3px}
.pc-item{display:flex;align-items:center;gap:6px}
.pc-toggle{
  width:16px;height:16px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;cursor:pointer;user-select:none;
  transition:background .15s;line-height:1;
}
.pc-toggle.plus {background:rgba(34,197,94,.18);color:#16a34a}
.pc-toggle.minus{background:rgba(239,68,68,.18);color:#dc2626}
.pc-text{flex:1;font-size:var(--fs-md);color:var(--text)}
#pc-add-btn{
  margin-top:3px;align-self:flex-start;
  font-size:var(--fs-xs);padding:2px 10px;border-radius:6px;border:none;
  background:var(--accent-lt);color:var(--accent);cursor:pointer;font-weight:600;
}
#pc-add-btn:hover{background:var(--accent-md)}

/* ═══════════════════════════════
   輪崗紀錄
═══════════════════════════════ */
#rotation-list{flex:1;display:flex;flex-direction:column;justify-content:space-evenly}
.rot-item{display:flex;align-items:baseline;gap:4px}
.rot-label{font-size:var(--fs-sm);color:var(--text-sub);font-weight:700;white-space:nowrap;min-width:46px}
/* same size as --fs-md */
.rot-val{font-size:var(--fs-md);color:var(--text)}
.rot-val[contenteditable]::before{
  content:attr(data-ph);
  color:var(--text-muted);
  display:none;
}
.rot-val[contenteditable]:empty::before{display:inline}

/* ═══════════════════════════════
   綜合評比
═══════════════════════════════ */
#radar-scatter-wrap{flex:1;display:flex;gap:6px;min-height:0;align-items:stretch}
#radar-wrap{
  flex:1;min-width:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;position:relative;cursor:pointer;
}
#radar-svg{width:100%;height:100%;overflow:visible;display:block}

/* radar popup — anchored INSIDE the card, not fixed */
#radar-popup{
  display:none;
  position:absolute;top:4px;left:4px;right:4px;
  background:var(--glass-hdr);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--glass-bdr);border-radius:12px;
  padding:10px 14px;gap:5px;
  flex-direction:column;z-index:50;
  box-shadow:0 6px 24px rgba(0,0,0,.14);
}
#radar-popup.open{display:flex}
.radar-ctrl-row{display:flex;align-items:center;gap:6px;font-size:var(--fs-sm);color:var(--text-sub)}
.radar-ctrl-row span.lbl{min-width:40px;font-weight:600}
.radar-ctrl-row input[type=range]{flex:1;accent-color:var(--accent)}
.radar-ctrl-row span.val{min-width:14px;text-align:right;color:var(--text);font-weight:700}
#radar-popup-close{
  align-self:flex-end;background:none;border:none;
  font-size:11px;color:var(--text-muted);cursor:pointer;margin-bottom:2px;padding:2px 6px;
  border-radius:5px;
}
#radar-popup-close:hover{background:var(--accent-lt)}

/* Scatter */
#scatter-wrap{
  flex:1;min-width:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;position:relative;cursor:pointer;
}
#scatter-stage{
  position:relative;
  width:min(100%,170px);height:min(100%,170px);aspect-ratio:1;
}
#scatter-grid{
  display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
  width:100%;height:100%;
}
.sg-cell{
  display:flex;align-items:center;justify-content:center;
  font-size:var(--fs-xs);font-weight:700;color:var(--text);
  border:1px solid rgba(37,99,235,.13);
}
.sg-cell.cw {background:rgba(255,255,255,.38)}
[data-theme="dark"] .sg-cell.cw{background:rgba(15,25,50,.38)}
.sg-cell.c1{background:rgba(219,234,254,.7)}
[data-theme="dark"] .sg-cell.c1{background:rgba(37,99,235,.14)}
.sg-cell.c2{background:rgba(147,197,253,.55)}
[data-theme="dark"] .sg-cell.c2{background:rgba(37,99,235,.30)}
.sg-cell.c3{background:rgba(59,130,246,.55);color:#fff}
[data-theme="dark"] .sg-cell.c3{background:rgba(37,99,235,.58);color:#fff}
.ax-label{position:absolute;font-size:var(--fs-xs);font-weight:700;color:var(--text-sub);pointer-events:none}
#ax-y{top:-2px;left:-2px}
#ax-x{bottom:-2px;right:-2px}
.ax-line{position:absolute;background:rgba(37,99,235,.28);pointer-events:none}
#axl-y{width:1.5px;top:0;bottom:0;left:-10px}
#axl-x{height:1.5px;left:0;right:0;bottom:-10px}
#scatter-dot{
  position:absolute;width:13px;height:13px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.28);
  cursor:grab;transform:translate(-50%,-50%);z-index:10;transition:box-shadow .15s;
}
#scatter-dot:active{cursor:grabbing;box-shadow:0 0 0 5px rgba(37,99,235,.4)}

/* scatter popup — also inside card */
#scatter-popup{
  display:none;position:absolute;bottom:4px;left:4px;right:4px;
  background:var(--glass-hdr);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--glass-bdr);border-radius:12px;
  padding:8px 14px;gap:5px;flex-direction:column;z-index:50;
  box-shadow:0 6px 24px rgba(0,0,0,.14);
}
#scatter-popup.open{display:flex}
.scat-ctrl-row{display:flex;align-items:center;gap:6px;font-size:var(--fs-xs);color:var(--text-sub)}
.scat-ctrl-row span{min-width:40px;font-weight:600}
.scat-ctrl-row input[type=range]{flex:1;accent-color:var(--accent)}
#scatter-popup-close{
  align-self:flex-end;background:none;border:none;
  font-size:11px;color:var(--text-muted);cursor:pointer;padding:2px 6px;border-radius:5px;
}
#scatter-popup-close:hover{background:var(--accent-lt)}

/* wrapper needs relative for popup anchoring */
.cell-radar .card{position:relative;overflow:visible}
.cell-radar .card-body{position:relative}

/* ═══════════════════════════════
   組織圖
═══════════════════════════════ */
#org-content{flex:1;display:flex;flex-direction:column;align-items:center;overflow:hidden;min-height:0}
#org-tree{flex:1;display:flex;flex-direction:column;align-items:center;width:100%;justify-content:flex-start;padding-top:4px}
.org-level{display:flex;flex-direction:column;align-items:center}
.org-node{
  padding:4px 20px;
  background:var(--accent-lt);border:1px solid rgba(37,99,235,.2);
  border-radius:8px;font-size:var(--fs-md);font-weight:700;
  color:var(--text);cursor:text;white-space:nowrap;min-width:88px;text-align:center;
}
.org-node.self{background:var(--accent-md);color:var(--accent)}
/* sub-desc only shown for self and sub-nodes */
.org-node-sub-desc{
  font-size:var(--fs-xs);color:var(--text-muted);
  text-align:center;margin-top:1px;cursor:text;
}
/* hide sub-desc on L1/L2 */
.org-level.no-desc .org-node-sub-desc{display:none}
.vline{width:1.5px;height:8px;background:rgba(37,99,235,.28);margin:0 auto}
.hline-wrap{position:relative;width:100%;height:8px}
.hline-wrap::before{content:'';position:absolute;top:0;left:50%;width:1.5px;height:100%;background:rgba(37,99,235,.28)}
.hline-wrap::after{content:'';position:absolute;top:50%;left:0;right:0;height:1.5px;background:rgba(37,99,235,.28)}
#sub-nodes{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.sub-col{display:flex;flex-direction:column;align-items:center;gap:2px}
.sub-vline{width:1.5px;height:7px;background:rgba(37,99,235,.28)}
.sub-node{
  padding:3px 12px;background:var(--accent-lt);border:1px solid rgba(37,99,235,.15);
  border-radius:7px;font-size:var(--fs-sm);font-weight:600;color:var(--text-sub);
  cursor:text;white-space:nowrap;text-align:center;
}
.sub-node-desc{font-size:var(--fs-xs);color:var(--text-muted);cursor:text;text-align:center;margin-top:1px}
#org-footer{
  flex-shrink:0;padding-top:6px;margin-top:4px;border-top:1px solid var(--divider);
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.sub-btn{
  width:22px;height:22px;border-radius:50%;
  background:var(--accent-lt);color:var(--accent);border:none;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;line-height:1;
}
#sub-count-label{font-size:var(--fs-xs);color:var(--text-muted)}

/* ═══════════════════════════════
   崗位匹配
═══════════════════════════════ */
#match-body{flex:1;display:flex;gap:6px;min-height:0}
.match-col{flex:1;min-width:0;display:flex;flex-direction:column;gap:0}
.match-col-hdr{
  display:flex;align-items:center;justify-content:center;
  padding:5px 4px;background:var(--glass-hdr);
  border-bottom:1px solid var(--divider);
  font-size:var(--fs-sm);font-weight:700;color:var(--accent);flex-shrink:0;
}
.match-items{flex:1;overflow:auto;display:flex;flex-direction:column}
.match-item{
  display:flex;align-items:center;gap:6px;
  padding:3px 8px;border-bottom:1px solid var(--divider);
}
.match-item:last-child{border-bottom:none}

/* lamp square — click to cycle */
.light-sq{
  width:13px;height:13px;border-radius:3px;flex-shrink:0;
  cursor:pointer;border:1px solid rgba(0,0,0,.10);transition:box-shadow .12s;
}
.light-sq:hover{box-shadow:0 0 0 2px rgba(0,0,0,.15)}
.sq-red   {background:#ef4444}
.sq-yellow{background:#eab308}
.sq-green {background:#22c55e}
.sq-gray  {background:#9ca3af}

.match-text{flex:1;font-size:var(--fs-md);color:var(--text)}
.match-col+.match-col{border-left:1px solid var(--divider)}

/* ═══ SETTINGS SIDEBAR ═══ */
#sidebar-overlay{display:none;position:fixed;inset:0;z-index:299;background:rgba(0,0,0,.13)}
#sidebar-overlay.show{display:block}
#sidebar{
  position:fixed;top:0;right:-280px;width:260px;height:100%;
  background:var(--glass-hdr);backdrop-filter:blur(24px) saturate(1.5);
  -webkit-backdrop-filter:blur(24px) saturate(1.5);
  border-left:1px solid var(--glass-bdr);z-index:300;padding:20px 18px;
  display:flex;flex-direction:column;gap:18px;
  transition:right .28s cubic-bezier(.4,0,.2,1);
  box-shadow:-4px 0 28px rgba(0,0,0,.10);
}
#sidebar.open{right:0}
#sidebar-close{align-self:flex-end;background:none;border:none;font-size:18px;color:var(--text-muted);cursor:pointer}
.sb-section-title{font-size:var(--fs-xs);font-weight:700;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase}
.sb-row{display:flex;align-items:center;justify-content:space-between;font-size:var(--fs-md);color:var(--text)}
.toggle-switch{position:relative;width:44px;height:24px;cursor:pointer}
.toggle-switch input{display:none}
.toggle-track{position:absolute;inset:0;border-radius:999px;background:rgba(37,99,235,.15);transition:background .2s}
.toggle-switch input:checked+.toggle-track{background:var(--accent)}
.toggle-knob{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.2);transition:left .2s}
.toggle-switch input:checked~.toggle-knob{left:23px}
#export-btn{width:100%;padding:9px;border-radius:10px;background:var(--accent);color:#fff;border:none;font-size:var(--fs-md);font-weight:700;cursor:pointer;transition:opacity .15s}
#export-btn:hover{opacity:.85}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(37,99,235,.18);border-radius:2px}
</style>
</head>
<body>

<div id="sidebar-overlay"></div>
<div id="sidebar">
  <button id="sidebar-close">✕</button>
  <div class="sb-section-title">外觀</div>
  <div class="sb-row">
    <span>深色模式</span>
    <label class="toggle-switch">
      <input type="checkbox" id="theme-toggle">
      <div class="toggle-track"></div>
      <div class="toggle-knob"></div>
    </label>
  </div>
  <div class="sb-section-title">匯出</div>
  <button id="export-btn">匯出 HTML 檔案</button>
</div>

<div id="app">

  <!-- PAGE HEADER -->
  <div id="page-header">
    <div id="page-header-left">
      <span id="page-title-zh">人才儀表板</span>
      <span id="page-title-en">Talent Dashboard</span>
    </div>
    <button id="settings-btn" title="設定">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"/>

<script>
/* ═══ PROFILE PIC ═══ */
document.getElementById('pic-input').addEventListener('change',function(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{document.getElementById('profile-pic').innerHTML=`<img src="${ev.target.result}" alt="profile">`};
  reader.readAsDataURL(file);
});

/* ═══ PROS & CONS ═══ */
function togglePC(el){
  if(el.classList.contains('plus')){el.classList.replace('plus','minus');el.textContent='−'}
  else{el.classList.replace('minus','plus');el.textContent='+'}
}
function addPC(){
  const list=document.getElementById('pc-list');
  const item=document.createElement('div'); item.className='pc-item';
  item.innerHTML=`<span class="pc-toggle plus" onclick="togglePC(this)">+</span><span class="pc-text" contenteditable="true">輸入內容</span>`;
  list.appendChild(item);
}

/* ═══ RADAR ═══
   Flat-top hex: left-3 (top-left, mid-left, bot-left) right-3 (top-right, mid-right, bot-right)
   Angles for flat-top (pointy sides):
     left col (from top to bot): 210°, 270°(=left), 330°
     right col (from top to bot): 150°, 90°(=right), 30°
   But we want left3=潛力,客戶,預算 and right3=xFun,xRD,xLOB
   Assignment: i=0 → 210° (top-left)=潛力, i=1 → 270°(mid-left)=客戶, i=2 → 330°(bot-left)=預算
               i=3 → 30°(bot-right)=xFun, i=4 → 90°(mid-right)=xRD, i=5 → 150°(top-right)=xLOB
   Then rotate the whole hex 45°: add 45° to each angle
*/
const radarVals=[7,6,8,5,7,6];
const radarLabels=['潛力','客戶','預算','xFun','xRD','xLOB'];
const cx=120, cy=105, R=68;
// flat-top angles + 45° rotation
const baseAngles=[210,270,330,30,90,150];
const angles=baseAngles.map(d=>(d+45)*Math.PI/180);

function hexPt(i,r){ return [cx+r*Math.cos(angles[i]), cy+r*Math.sin(angles[i])] }

function drawRadar(){
  const svg=document.getElementById('radar-svg');
  const dark=document.documentElement.dataset.theme==='dark';
  const gc=dark?'rgba(96,165,250,.15)':'rgba(37,99,235,.12)';
  const fc=dark?'rgba(96,165,250,.22)':'rgba(37,99,235,.18)';
  const sc=dark?'#60a5fa':'#2563eb';
  const tc=dark?'#94afd4':'#4a5c80';
  const vc=dark?'#e2eafc':'#1a2540';
  let h='';
  // grid rings
  for(let r=2;r<=10;r+=2){
    const pts=angles.map((_,i)=>hexPt(i,R*(r/10)).join(',')).join(' ');
    h+=`<polygon points="${pts}" fill="none" stroke="${gc}" stroke-width="1"/>`;
  }
  // spokes
  for(let i=0;i<6;i++){
    const [x,y]=hexPt(i,R);
    h+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="${gc}" stroke-width="1"/>`;
  }
  // data polygon
  const dp=radarVals.map((v,i)=>hexPt(i,R*(v/10)).join(',')).join(' ');
  h+=`<polygon points="${dp}" fill="${fc}" stroke="${sc}" stroke-width="2"/>`;
  // labels — larger font
  for(let i=0;i<6;i++){
    const [lx,ly]=hexPt(i,R+20);
    const [vx,vy]=hexPt(i,R+36);
    const anc=lx<cx-5?'end':lx>cx+5?'start':'middle';
    h+=`<text x="${lx}" y="${ly}" text-anchor="${anc}" font-size="13" fill="${tc}" font-weight="700">${radarLabels[i]}</text>`;
    h+=`<text x="${vx}" y="${vy}" text-anchor="${anc}" font-size="14" fill="${vc}" font-weight="800">${radarVals[i]}</text>`;
  }
  svg.innerHTML=h;
}

function setRadar(idx,val){
  radarVals[idx]=val;
  document.getElementById('rv'+idx).textContent=val;
  drawRadar();
}

function openRadarPopup(e){
  e.stopPropagation();
  const p=document.getElementById('radar-popup');
  p.classList.toggle('open');
}
document.getElementById('radar-popup-close').addEventListener('click',e=>{
  e.stopPropagation();
  document.getElementById('radar-popup').classList.remove('open');
});

/* ═══ SCATTER ═══ */
let dotPx=3,dotPy=3;
function positionDot(){
  const grid=document.getElementById('scatter-grid');
  const dot=document.getElementById('scatter-dot');
  const stage=document.getElementById('scatter-stage');
  const gr=grid.getBoundingClientRect();
  const sr=stage.getBoundingClientRect();
  dot.style.left=(gr.left-sr.left+(dotPx/6)*gr.width)+'px';
  dot.style.top =(gr.top -sr.top +(dotPy/6)*gr.height)+'px';
}
function updateDotSlider(){
  dotPx=+document.getElementById('dot-x-slider').value;
  dotPy=+document.getElementById('dot-y-slider').value;
  positionDot();
}
const dotEl=document.getElementById('scatter-dot');
let dragging=false,dsx,dsy,dpx0,dpy0;
dotEl.addEventListener('mousedown',e=>{dragging=true;dsx=e.clientX;dsy=e.clientY;dpx0=dotPx;dpy0=dotPy;e.preventDefault();e.stopPropagation()});
document.addEventListener('mousemove',e=>{
  if(!dragging) return;
  const gr=document.getElementById('scatter-grid').getBoundingClientRect();
  dotPx=Math.max(0,Math.min(6,dpx0+(e.clientX-dsx)/gr.width*6));
  dotPy=Math.max(0,Math.min(6,dpy0+(e.clientY-dsy)/gr.height*6));
  document.getElementById('dot-x-slider').value=dotPx;
  document.getElementById('dot-y-slider').value=dotPy;
  positionDot();
});
document.addEventListener('mouseup',()=>{dragging=false});

function openScatterPopup(e){
  e.stopPropagation();
  const p=document.getElementById('scatter-popup');
  p.classList.toggle('open');
}
document.getElementById('scatter-popup-close').addEventListener('click',e=>{
  e.stopPropagation();
  document.getElementById('scatter-popup').classList.remove('open');
});

// close popups on outside click
document.addEventListener('click',()=>{
  document.getElementById('radar-popup').classList.remove('open');
  document.getElementById('scatter-popup').classList.remove('open');
});
document.getElementById('radar-popup').addEventListener('click',e=>e.stopPropagation());
document.getElementById('scatter-popup').addEventListener('click',e=>e.stopPropagation());

/* ═══ ORG CHART ═══ */
let subCount=3;
const subNames=['部屬甲','部屬乙','部屬丙','部屬丁','部屬戊'];
const subDescs=['說明','說明','說明','說明','說明'];
function renderSubNodes(){
  const wrap=document.getElementById('sub-nodes'); wrap.innerHTML='';
  for(let i=0;i<subCount;i++){
    const col=document.createElement('div'); col.className='sub-col';
    col.innerHTML=`<div class="sub-vline"></div>
      <div class="sub-node" contenteditable="true">${subNames[i]||'部屬'}</div>
      <div class="sub-node-desc" contenteditable="true">${subDescs[i]||'說明'}</div>`;
    col.querySelector('.sub-node').addEventListener('blur',function(){subNames[i]=this.textContent});
    col.querySelector('.sub-node-desc').addEventListener('blur',function(){subDescs[i]=this.textContent});
    wrap.appendChild(col);
  }
  document.getElementById('sub-count-label').textContent=subCount+' 位部屬';
}
function changeSubCount(d){subCount=Math.max(1,Math.min(5,subCount+d));renderSubNodes()}

/* ═══ MATCH COLUMNS ═══ */
const MATCH_COLS=[{id:'col-was'},{id:'col-now'},{id:'col-tobe'}];
const SQ_COLORS=['sq-green','sq-yellow','sq-red','sq-gray'];

const MATCH_DATA=[
  // Was (N-2) — default gray
  ['專案管理','任務拆解與執行','問題解決','客戶信任度','預算控管成本意識','專案帶領與目標驅動','系統改善','內部資源協調','正向力團隊調動','團隊能力拓展'],
  // Now (N-1)
  ['多專案並行管理','戰略轉譯與落地','危機處理與消除','客戶關係維護','預算與成本控制','跨職能協調','流程架構優化','資源配置優先級','團隊梯隊建設','人才選育用留'],
  // To Be (N)
  ['資源協調分配','願景形塑與組織文化','系統性預防排除','客戶戰略對齊','運營管理','跨組織協調折衝','變革管理與數位轉型','資源取得與調度','戰略組織設計','接班梯隊選拔育成']
];

// N-2 defaults to gray; N-1 and N default to gray too (user can click to select)
const matchState=MATCH_DATA.map((col,ci)=>col.map(t=>({text:t, color:'sq-gray'})));

function buildMatchCol(ci){
  const list=document.getElementById(MATCH_COLS[ci].id).querySelector('.match-items');
  list.innerHTML='';
  matchState[ci].forEach((item,i)=>{
    const row=document.createElement('div'); row.className='match-item';
    const sq=document.createElement('div');
    sq.className='light-sq '+item.color;
    sq.dataset.ci=ci; sq.dataset.i=i;

    // Click cycles through colors
    sq.addEventListener('click',function(){
      const ci2=+this.dataset.ci, ii=+this.dataset.i;
      const cur=SQ_COLORS.indexOf(matchState[ci2][ii].color);
      matchState[ci2][ii].color=SQ_COLORS[(cur+1)%SQ_COLORS.length];
      this.className='light-sq '+matchState[ci2][ii].color;
    });

    const txt=document.createElement('span');
    txt.className='match-text'; txt.contentEditable='true'; txt.textContent=item.text;
    txt.addEventListener('blur',function(){matchState[ci][i].text=this.textContent});

    row.appendChild(sq); row.appendChild(txt);
    list.appendChild(row);
  });
}

/* ═══ SIDEBAR & THEME ═══ */
document.getElementById('settings-btn').addEventListener('click',()=>{
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('show');
});

  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}
document.getElementById('sidebar-close').addEventListener('click',closeSidebar);
document.getElementById('sidebar-overlay').addEventListener('click',closeSidebar);
document.getElementById('theme-toggle').addEventListener('change',function(){
  document.documentElement.dataset.theme=this.checked?'dark':'light';
  drawRadar();
});

/* ═══ EXPORT ═══ */
document.getElementById('export-btn').addEventListener('click',()=>{
  const html='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([html],{type:'text/html'}));
  a.download='talent-dashboard.html'; a.click();
  URL.revokeObjectURL(a.href);
});

/* ═══ INIT ═══ */
function init(){
  drawRadar();
  renderSubNodes();
  MATCH_COLS.forEach((_,i)=>buildMatchCol(i));
  requestAnimationFrame(()=>requestAnimationFrame(positionDot));
}
window.addEventListener('load',init);
window.addEventListener('resize',()=>{positionDot();renderSubNodes()});
</script>
