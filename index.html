<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人才儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* ── TOKENS ── */
:root {
  --fs-xl:16px; --fs-lg:15px; --fs-md:13px; --fs-sm:12px; --fs-xs:11px;
  --bg:#E4EEFD;
  --blur1:radial-gradient(ellipse at 20% 30%,rgba(99,155,255,.16) 0%,transparent 60%);
  --blur2:radial-gradient(ellipse at 80% 70%,rgba(130,180,255,.12) 0%,transparent 55%);
  --glass:rgba(255,255,255,.78);
  --glass-hdr:rgba(255,255,255,.92);
  --glass-bdr:rgba(255,255,255,.88);
  --page-hdr:rgba(255,255,255,.88);
  --text:#1a2540; --text-sub:#4a5c80; --text-muted:#7a90b8;
  --accent:#2563eb; --accent-lt:rgba(37,99,235,.10); --accent-md:rgba(37,99,235,.18);
  --accent2:#60a5fa; --divider:rgba(37,99,235,.10); --hdr-title:#1e3a6e;
}
[data-theme="dark"] {
  --bg:linear-gradient(135deg,#0b1120 0%,#0f1a30 45%,#101828 100%);
  --blur1:radial-gradient(ellipse at 20% 30%,rgba(37,99,235,.22) 0%,transparent 60%);
  --blur2:radial-gradient(ellipse at 80% 70%,rgba(96,165,250,.14) 0%,transparent 55%);
  --glass:rgba(15,25,50,.60); --glass-hdr:rgba(15,25,50,.85);
  --glass-bdr:rgba(255,255,255,.10); --page-hdr:rgba(12,20,42,.80);
  --text:#e2eafc; --text-sub:#94afd4; --text-muted:#5b7aa8;
  --accent:#60a5fa; --accent-lt:rgba(96,165,250,.12); --accent-md:rgba(96,165,250,.22);
  --accent2:#93c5fd; --divider:rgba(96,165,250,.12); --hdr-title:#93c5fd;
}

/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;
  font-family:'Segoe UI','PingFang TC','Noto Sans TC',sans-serif;
  font-size:var(--fs-md);color:var(--text)}
body{background:var(--bg);position:relative}
body::before{content:'';position:fixed;inset:0;
  background:var(--blur1),var(--blur2);pointer-events:none;z-index:0}

/* ── LAYOUT — DESKTOP (no scroll, fixed 2-row) ── */
#app{position:relative;z-index:1;width:100vw;height:100vh;
  display:flex;flex-direction:column;padding:16px;gap:6px;overflow:hidden}
.row{display:flex;gap:6px;min-height:0}
.row-top{flex:38 1 0}
.row-bot{flex:62 1 0}

/* column flex weights — desktop */
.cell-intro   {flex:3.2;min-width:0}
.cell-rotation{flex:2;min-width:0}
.cell-radar   {flex:4.8;min-width:0}
.cell-org     {flex:3.2;min-width:0}
.cell-match   {flex:6.8;min-width:0}

.card{height:100%}

/* ── TABLET (≤1024px): 3 rows, vertical scroll ── */
@media(max-width:1024px){
  html,body{overflow-y:auto;overflow-x:hidden}

  #app{
    height:auto;min-height:100svh;overflow:visible;
    padding:12px;gap:8px;
    display:grid;
    grid-template-columns:3fr 2fr;
    grid-template-rows:auto;
    grid-template-areas:
      "header header"
      "intro rotation"
      "radar org"
      "match match";
  }

  .row,.row-top,.row-bot{display:contents}

  #page-header{grid-area:header}
  .cell-intro   {grid-area:intro;   min-height:240px}
  .cell-rotation{grid-area:rotation;min-height:240px}
  .cell-radar   {grid-area:radar;   min-height:340px}
  .cell-org     {grid-area:org;     min-height:340px}
  .cell-match   {grid-area:match;   min-height:380px}

  .cell-intro,.cell-rotation,.cell-radar,.cell-org,.cell-match{display:flex;flex-direction:column}
  .cell-intro .card,.cell-rotation .card,.cell-radar .card,.cell-org .card,.cell-match .card{height:100%;flex:1}
  .card-body{align-items:stretch}
}

/* ── MOBILE (≤600px): every card full-width, single column ── */
@media(max-width:600px){
  html,body{overflow-y:auto;overflow-x:hidden}
  #app{
    height:auto;min-height:100svh;overflow:visible;
    padding:10px;gap:8px;
    display:grid;
    grid-template-columns:1fr;
    grid-template-areas:
      "header"
      "intro"
      "rotation"
      "radar"
      "org"
      "match";
  }
  .row,.row-top,.row-bot{display:contents}
  #page-header{grid-area:header}
  .cell-intro   {grid-area:intro;   min-height:220px}
  .cell-rotation{grid-area:rotation;min-height:220px}
  .cell-radar   {grid-area:radar;   min-height:320px}
  .cell-org     {grid-area:org;     min-height:280px}
  .cell-match   {grid-area:match;   min-height:440px}
  .cell-intro,.cell-rotation,.cell-radar,.cell-org,.cell-match{display:flex;flex-direction:column}
  .cell-intro .card,.cell-rotation .card,.cell-radar .card,.cell-org .card,.cell-match .card{height:100%;flex:1}
}

/* ── PAGE HEADER ── */
#page-header{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;height:44px;background:var(--page-hdr);
  backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);
  border:1px solid var(--glass-bdr);border-radius:14px;
  box-shadow:0 2px 14px rgba(37,99,235,.07)}
#page-header-left{display:flex;align-items:baseline;gap:10px}
#page-title-zh{font-size:18px;font-weight:800;color:var(--hdr-title);letter-spacing:.03em}
#page-title-en{font-size:var(--fs-sm);font-weight:600;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase}
#settings-btn{width:34px;height:34px;border-radius:9px;border:none;cursor:pointer;
  background:var(--accent-lt);color:var(--accent);
  display:flex;align-items:center;justify-content:center;transition:background .15s}
#settings-btn:hover{background:var(--accent-md)}
#settings-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;
  stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ── GLASS CARD ── */
.card{background:var(--glass);
  backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);
  border:1px solid var(--glass-bdr);border-radius:14px;overflow:hidden;
  display:flex;flex-direction:column;height:100%;
  box-shadow:0 4px 20px rgba(37,99,235,.06),0 1px 4px rgba(0,0,0,.04)}
.card-hdr{flex-shrink:0;display:flex;align-items:center;padding:6px 12px;
  background:var(--glass-hdr);border-bottom:1px solid var(--divider)}
.card-title{font-size:var(--fs-lg);font-weight:700;color:var(--hdr-title);letter-spacing:.04em}
.card-body{flex:1;min-height:0;padding:8px 12px;overflow:hidden;
  display:flex;flex-direction:column}

/* ── EDITABLE ── */
[contenteditable]{outline:none;cursor:text;border-radius:4px;
  transition:background .15s;min-width:16px;display:inline-block}
[contenteditable]:hover{background:rgba(37,99,235,.07)}
[contenteditable]:focus{background:rgba(37,99,235,.12)}

/* ── SECTION DIVIDER (shared) ── */
.grp{display:flex;flex-direction:column;gap:3px}
.grp+.grp{margin-top:8px;padding-top:8px;border-top:1px solid var(--divider)}

/* ════════════════════════════════════════
   1. 人才介紹
════════════════════════════════════════ */
.cell-intro .card-hdr{display:none}  /* no header; content fills full card */

#intro-body{display:flex;gap:4px;flex:1;min-height:0;padding:20px 20px 16px 20px;align-items:flex-start}

/* LEFT: photo + performance — flex 3 (narrower) */
#intro-left{flex:3;display:flex;flex-direction:column;align-items:center;gap:10px;min-width:0}

#pic-wrap{position:relative;display:inline-block}
#profile-pic{
  width:72px;height:72px;border-radius:50%;
  background:var(--accent-lt);border:2px solid var(--glass-bdr);overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;cursor:pointer;transition:box-shadow .2s;flex-shrink:0}
#profile-pic:hover{box-shadow:0 0 0 3px var(--accent2)}
#profile-pic img{width:100%;height:100%;object-fit:cover}
#pic-input{display:none}
#pic-remove-btn{
  display:none;position:absolute;top:-3px;right:-3px;
  width:18px;height:18px;border-radius:50%;
  background:#ef4444;color:#fff;border:none;
  font-size:11px;cursor:pointer;
  align-items:center;justify-content:center;line-height:1}

#perf-block{display:flex;flex-direction:column;align-items:center;gap:4px;width:100%}
#perf-block-label{font-size:var(--fs-xs);color:var(--text-muted);font-weight:600;letter-spacing:.05em}
#perf-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.perf-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.perf-yr{font-size:var(--fs-xs);color:var(--text-muted);font-weight:600;min-width:28px;text-align:center}
.perf-grade{
  font-size:var(--fs-sm);padding:2px 6px;border-radius:7px;
  border:1px solid var(--glass-bdr);background:var(--accent-lt);
  color:var(--text);font-weight:700;cursor:pointer;
  appearance:none;-webkit-appearance:none;outline:none}

/* RIGHT: name / org / pros & cons — flex 5 */
#intro-details{flex:5;min-width:0;display:flex;flex-direction:column;padding-top:1px;overflow:auto}
#talent-name{font-size:var(--fs-xl);font-weight:800;color:var(--accent);line-height:1.2}
#talent-major{font-size:var(--fs-md);color:var(--text-sub)}
#talent-org{
  display:inline-block;padding:2px 12px;
  background:var(--accent-lt);color:var(--accent);
  border-radius:999px;font-size:var(--fs-sm);font-weight:700}
#pc-list{display:flex;flex-direction:column;gap:3px}
.pc-item{display:flex;align-items:flex-start;gap:6px}
.pc-toggle{
  width:16px;height:16px;border-radius:50%;flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;cursor:pointer;user-select:none;transition:background .15s}
.pc-toggle.plus {background:rgba(34,197,94,.18);color:#16a34a}
.pc-toggle.minus{background:rgba(239,68,68,.18);color:#dc2626}
.pc-text{flex:1;font-size:var(--fs-md);color:var(--text)}
.pc-del{
  flex-shrink:0;width:14px;height:14px;border-radius:50%;border:none;
  background:rgba(239,68,68,.15);color:#dc2626;font-size:11px;line-height:1;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s}
.pc-item:hover .pc-del{opacity:1}

/* ════════════════════════════════════════
   2. 輪崗紀錄
════════════════════════════════════════ */
#rotation-list{flex:1;display:flex;flex-direction:column;gap:12px;padding-top:4px}
.rot-item{display:flex;align-items:baseline;gap:4px}
.rot-label{font-size:var(--fs-sm);color:var(--text-sub);font-weight:700;white-space:nowrap;min-width:48px}
.rot-val{font-size:var(--fs-md);color:var(--text)}
.rot-val:empty::before{content:attr(data-ph);color:var(--text-muted)}

/* ════════════════════════════════════════
   3. 綜合評比 — Radar + Matrix
════════════════════════════════════════ */
/* ── RADAR + MATRIX: side by side, equal sizing ── */
.cell-radar .card-body{position:relative;overflow:visible;
  display:flex;align-items:center;justify-content:center;padding:4px 12px}

#radar-scatter-wrap{
  display:flex;gap:8px;align-items:center;justify-content:center;
  width:100%;height:100%}

/* Radar group — square, same flex as matrix */
#radar-group{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;min-width:0;height:100%;max-width:240px}
#radar-wrap{width:100%;flex:1;min-height:0;display:flex;align-items:center;justify-content:center}
#radar-svg{width:100%;height:100%;overflow:visible;display:block;cursor:crosshair}

/* Matrix group — same flex as radar */
#scatter-group{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;min-width:0;height:100%;max-width:240px}
#scatter-wrap{display:flex;align-items:center;justify-content:center;width:100%;flex:1;min-height:0}
#matrix-container{position:relative;width:150px;height:150px;
  display:flex;align-items:center;justify-content:center;margin-top:10px}
#matrix-area{position:relative;width:126px;height:126px}

#scatter-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
  width:100%;height:100%}
.sg-cell{display:flex;align-items:center;justify-content:center;
  font-size:var(--fs-xs);font-weight:700;color:var(--text);
  border:1px solid rgba(37,99,235,.13)}
.sg-cell.cw {background:rgba(255,255,255,.38)}
[data-theme="dark"] .sg-cell.cw{background:rgba(15,25,50,.38)}
.sg-cell.c1 {background:rgba(219,234,254,.7)}
[data-theme="dark"] .sg-cell.c1{background:rgba(37,99,235,.14)}
.sg-cell.c2 {background:rgba(147,197,253,.55)}
[data-theme="dark"] .sg-cell.c2{background:rgba(37,99,235,.30)}
.sg-cell.c3 {background:rgba(59,130,246,.55);color:#fff}
[data-theme="dark"] .sg-cell.c3{background:rgba(37,99,235,.58);color:#fff}

/* axis labels */
#ax-y-label{position:absolute;left:-28px;top:-20px;
  font-size:var(--fs-xs);font-weight:700;color:var(--text-sub);
  white-space:nowrap;pointer-events:none}
#ax-x-label{position:absolute;bottom:-22px;right:-28px;
  font-size:var(--fs-xs);font-weight:700;color:var(--text-sub);
  white-space:nowrap;pointer-events:none}

/* Y drag bar (left of grid) */
#bar-y{position:absolute;left:-22px;top:0;height:100%;width:10px;cursor:ns-resize}
#bar-y-track{position:absolute;left:4px;top:0;bottom:0;width:2px;
  background:rgba(37,99,235,.2);border-radius:1px}
#bar-y-thumb{position:absolute;left:0;width:10px;height:10px;border-radius:50%;
  background:var(--accent);cursor:ns-resize;transform:translateY(-50%);
  box-shadow:0 0 0 2px rgba(37,99,235,.3)}

/* X drag bar (below grid) */
#bar-x{position:absolute;bottom:-18px;left:0;width:100%;height:10px;cursor:ew-resize}
#bar-x-track{position:absolute;top:4px;left:0;right:0;height:2px;
  background:rgba(37,99,235,.2);border-radius:1px}
#bar-x-thumb{position:absolute;top:0;width:10px;height:10px;border-radius:50%;
  background:var(--accent);cursor:ew-resize;transform:translateX(-50%);
  box-shadow:0 0 0 2px rgba(37,99,235,.3)}

/* dot */
#scatter-dot{position:absolute;width:12px;height:12px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.28);
  transform:translate(-50%,50%);z-index:10;pointer-events:none}

/* ════════════════════════════════════════
   4. 組織圖
════════════════════════════════════════ */
#org-content{flex:1;display:flex;flex-direction:column;align-items:center;
  overflow:hidden;min-height:0}
#org-tree{flex:1;display:flex;flex-direction:column;align-items:center;
  width:100%;padding-top:4px;overflow:hidden}

.org-level{display:flex;flex-direction:column;align-items:center}
.org-node{
  padding:4px 14px;min-width:90px;max-width:160px;text-align:center;
  background:var(--accent-lt);border:1px solid rgba(37,99,235,.2);border-radius:8px;
  font-size:var(--fs-sm);font-weight:700;color:var(--text);
  cursor:text;word-break:break-all;white-space:normal}
.org-node.self{background:var(--accent-md);color:var(--accent)}
.org-node-note{font-size:var(--fs-xs);color:var(--text-muted);
  text-align:center;margin-top:2px;cursor:text;min-height:14px}

.vline{width:1.5px;height:8px;background:rgba(37,99,235,.28);margin:0 auto}

/* connector SVG (drawn by JS) */
#org-connector-svg{height:22px}

#sub-nodes{display:flex;gap:4px;justify-content:center;width:100%;overflow:hidden}
.sub-col{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:0}
.sub-node{
  width:100%;padding:2px 4px;text-align:center;
  background:var(--accent-lt);border:1px solid rgba(37,99,235,.15);border-radius:7px;
  font-size:var(--fs-xs);font-weight:600;color:var(--text-sub);
  cursor:text;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sub-node-note{width:100%;font-size:var(--fs-xs);color:var(--text-muted);
  text-align:center;margin-top:1px;cursor:text;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

#org-footer{flex-shrink:0;padding:10px 0 12px;margin-top:6px;
  border-top:1px solid var(--divider);
  display:flex;align-items:center;justify-content:center;gap:8px}
.sub-btn{width:22px;height:22px;border-radius:50%;border:none;
  background:var(--accent-lt);color:var(--accent);font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
#sub-count-label{font-size:var(--fs-xs);color:var(--text-muted)}

/* ════════════════════════════════════════
   5. 崗位匹配
════════════════════════════════════════ */
.cell-match .card{overflow:hidden}  /* ensure border-radius clips match-body */
#match-body{flex:1;display:flex;min-height:0}
.match-col{flex:1;min-width:0;display:flex;flex-direction:column}
.match-col+.match-col{border-left:1px solid var(--divider)}
.match-col-hdr{
  flex-shrink:0;display:block;text-align:center;
  padding:5px 4px;background:var(--glass-hdr);border-bottom:1px solid var(--divider);
  font-size:var(--fs-sm);font-weight:700;color:var(--accent)}
.match-items{flex:1;overflow:auto;display:flex;flex-direction:column}
.match-item{flex:1;display:flex;align-items:center;gap:6px;
  padding:3px 8px;border-bottom:1px solid var(--divider)}
.match-item:last-child{border-bottom:none}
.match-text{flex:1;font-size:var(--fs-md);color:var(--text)}

/* match legend in header */
#match-legend{display:flex;align-items:center;gap:8px;margin-left:auto}
.legend-item{display:flex;align-items:center;gap:3px;font-size:var(--fs-xs);color:var(--text-sub);font-weight:600}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.light-swatch{
  flex-shrink:0;width:20px;height:20px;border-radius:3px;
  border:1px solid rgba(0,0,0,.15);cursor:pointer;position:relative;user-select:none}
.light-swatch.c-gray  {background:#9ca3af}
.light-swatch.c-green {background:#22c55e}
.light-swatch.c-yellow{background:#eab308}
.light-swatch.c-red   {background:#ef4444}
.swatch-popup{
  display:none;position:absolute;left:0;top:24px;z-index:200;
  background:var(--glass-hdr);border:1px solid var(--glass-bdr);
  border-radius:7px;padding:5px;gap:4px;
  box-shadow:0 4px 18px rgba(0,0,0,.16);flex-direction:row}
.swatch-popup.open{display:flex}
.swatch-opt{
  width:18px;height:18px;border-radius:3px;cursor:pointer;flex-shrink:0;
  border:1.5px solid transparent;transition:transform .1s,border-color .1s}
.swatch-opt:hover{transform:scale(1.18)}
.swatch-opt.selected{border-color:#fff;box-shadow:0 0 0 1.5px rgba(0,0,0,.25)}
.swatch-opt.s-gray  {background:#9ca3af}
.swatch-opt.s-green {background:#22c55e}
.swatch-opt.s-yellow{background:#eab308}
.swatch-opt.s-red   {background:#ef4444}

/* ════════════════════════════════════════
   SETTINGS SIDEBAR
════════════════════════════════════════ */
#sidebar-overlay{display:none;position:fixed;inset:0;z-index:299;background:rgba(0,0,0,.13)}
#sidebar-overlay.show{display:block}
#sidebar{
  position:fixed;top:0;right:-280px;width:260px;height:100%;z-index:300;
  background:var(--glass-hdr);
  backdrop-filter:blur(24px) saturate(1.5);-webkit-backdrop-filter:blur(24px) saturate(1.5);
  border-left:1px solid var(--glass-bdr);padding:20px 18px;
  display:flex;flex-direction:column;gap:18px;
  transition:right .28s cubic-bezier(.4,0,.2,1);
  box-shadow:-4px 0 28px rgba(0,0,0,.10)}
#sidebar.open{right:0}
#sidebar-close{align-self:flex-end;background:none;border:none;
  font-size:18px;color:var(--text-muted);cursor:pointer}
.sb-section-title{font-size:var(--fs-xs);font-weight:700;color:var(--text-muted);
  letter-spacing:.08em;text-transform:uppercase}
.sb-row{display:flex;align-items:center;justify-content:space-between;
  font-size:var(--fs-md);color:var(--text)}
.toggle-switch{position:relative;width:44px;height:24px;cursor:pointer}
.toggle-switch input{display:none}
.toggle-track{position:absolute;inset:0;border-radius:999px;
  background:rgba(37,99,235,.15);transition:background .2s}
.toggle-switch input:checked+.toggle-track{background:var(--accent)}
.toggle-knob{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;
  background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.2);transition:left .2s}
.toggle-switch input:checked~.toggle-knob{left:23px}
#export-btn,#export-jpg-btn{width:100%;padding:9px;border-radius:10px;

<script>
/* ── PROFILE PIC ── */
document.getElementById('pic-input').addEventListener('change', function(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {

    document.getElementById('pic-remove-btn').style.display = 'flex';

});
function removePic(e) {
  e.stopPropagation();

  document.getElementById('pic-remove-btn').style.display = 'none';
  document.getElementById('pic-input').value = '';
}

/* ── PROS & CONS ── */
function togglePC(el) {
  if (el.classList.contains('plus')) { el.classList.replace('plus','minus'); el.textContent='−'; }
  else { el.classList.replace('minus','plus'); el.textContent='+'; }
}
function delPC(btn) {
  btn.closest('.pc-item').remove();
}
function addPC() {
  const list = document.getElementById('pc-list');
  const item = document.createElement('div'); item.className = 'pc-item';
  const tog = document.createElement('span');
  tog.className = 'pc-toggle plus'; tog.textContent = '+';
  tog.onclick = () => togglePC(tog);
  const txt = document.createElement('span');
  txt.className = 'pc-text'; txt.contentEditable = 'true';
  txt.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addPC(); } });
  const del = document.createElement('button');
  del.className = 'pc-del'; del.textContent = '✕'; del.title = '刪除';
  del.onclick = () => item.remove();
  item.appendChild(tog); item.appendChild(txt); item.appendChild(del);
  list.appendChild(item); txt.focus();
}
document.querySelectorAll('.pc-text').forEach(el =>
  el.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addPC(); } })
);

/* ── RADAR ── */
// Flat-top hexagon: vertices at 0°,60°,120°,180°,240°,300°
// Right-3: i=0(0°),1(60°),5(300°)  |  Left-3: i=2(120°),3(180°),4(240°)
const radarVals = [3.5, 3, 4, 2.5, 3.5, 3];
const radarLabels = ['xRD','xFun','預算','客戶','潛力','xLOB'];
const RCX = 120, RCY = 108, R = 62;
const radarAngles = [0,60,120,180,240,300].map(d => d * Math.PI / 180);
let radarDragIdx = -1;

function hexPt(i, r) {
  return [RCX + r * Math.cos(radarAngles[i]), RCY + r * Math.sin(radarAngles[i])];
}

function drawRadar() {
  const svg = document.getElementById('radar-svg');
  const dark = document.documentElement.dataset.theme === 'dark';
  const gc = dark ? 'rgba(96,165,250,.15)' : 'rgba(37,99,235,.12)';
  const fc = dark ? 'rgba(96,165,250,.22)' : 'rgba(37,99,235,.18)';
  const sc = dark ? '#60a5fa' : '#2563eb';
  const tc = dark ? '#94afd4' : '#4a5c80';
  const vc = dark ? '#e2eafc' : '#1a2540';
  let h = '';
  // grid rings
  for (let r = 1; r <= 5; r++) {
    const pts = radarAngles.map((_,i) => hexPt(i, R*(r/5)).join(',')).join(' ');
    h += `<polygon points="${pts}" fill="none" stroke="${gc}" stroke-width="1"/>`;
  }
  // spokes
  for (let i = 0; i < 6; i++) {
    const [x,y] = hexPt(i, R);
    h += `<line x1="${RCX}" y1="${RCY}" x2="${x}" y2="${y}" stroke="${gc}" stroke-width="1"/>`;
  }
  // data shape
  const dp = radarVals.map((v,i) => hexPt(i, R*(v/5)).join(',')).join(' ');
  h += `<polygon points="${dp}" fill="${fc}" stroke="${sc}" stroke-width="2"/>`;
  // Labels: value on top line, name on bottom line — stacked in screen Y, centered on spoke tip
  // Anchor point at R+20 along spoke; stack: value at anchor-9, name at anchor+9
  for (let i = 0; i < 6; i++) {
    const ux = Math.cos(radarAngles[i]), uy = Math.sin(radarAngles[i]);
    const ax = (RCX + (R+20)*ux).toFixed(1);
    const ay = (RCY + (R+20)*uy).toFixed(1);
    h += `<text x="${ax}" y="${ay}" text-anchor="middle" font-size="12" fill="${vc}" font-weight="800" dy="-7">${radarVals[i]}</text>`;
    h += `<text x="${ax}" y="${ay}" text-anchor="middle" font-size="11" fill="${tc}" font-weight="700" dy="7">${radarLabels[i]}</text>`;
    const [hx,hy] = hexPt(i, R*(radarVals[i]/5));
    h += `<circle cx="${hx.toFixed(1)}" cy="${hy.toFixed(1)}" r="6" fill="${sc}" opacity=".9" stroke="#fff" stroke-width="1.5" style="cursor:grab" data-idx="${i}" class="radar-handle"/>`;
  }
  svg.innerHTML = h;
  svg.querySelectorAll('.radar-handle').forEach(el => {
    el.addEventListener('mousedown', e => { radarDragIdx = +e.target.dataset.idx; e.preventDefault(); });
    el.addEventListener('touchstart', e => { radarDragIdx = +e.target.dataset.idx; e.preventDefault(); }, {passive:false});
  });
}

function radarDragMove(mx, my) {
  if (radarDragIdx < 0) return;
  const svg = document.getElementById('radar-svg');
  const bb = svg.getBoundingClientRect(), vb = svg.viewBox.baseVal;
  const sx = (mx-bb.left)/bb.width*vb.width;
  const sy = (my-bb.top)/bb.height*vb.height;
  const proj = (sx-RCX)*Math.cos(radarAngles[radarDragIdx]) + (sy-RCY)*Math.sin(radarAngles[radarDragIdx]);
  radarVals[radarDragIdx] = Math.round(Math.max(0, Math.min(5, proj/R*5)) * 2) / 2;
  drawRadar();
}

document.addEventListener('mousemove', e => { if (radarDragIdx >= 0) radarDragMove(e.clientX, e.clientY); });
document.addEventListener('mouseup', () => { radarDragIdx = -1; });
document.addEventListener('touchmove', e => {
  if (radarDragIdx >= 0) { radarDragMove(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }
}, {passive:false});
document.addEventListener('touchend', () => { radarDragIdx = -1; });

/* ── MATRIX BAR DRAG ── */
let dotRx = 0.5, dotRy = 0.5;

function updateMatrixDot() {
  const area = document.getElementById('matrix-area');
  const w = area.clientWidth, h = area.clientHeight;
  document.getElementById('scatter-dot').style.left   = (dotRx * w) + 'px';
  document.getElementById('scatter-dot').style.bottom = (dotRy * h) + 'px';
  document.getElementById('bar-x-thumb').style.left   = (dotRx * w) + 'px';
  document.getElementById('bar-y-thumb').style.top    = ((1-dotRy) * h) + 'px';
}

(function setupBarDrag() {
  let activeBar = null;
  function startDrag(e, bar) { activeBar = bar; e.preventDefault(); }
  function onMove(e) {
    if (!activeBar) return;
    const r = document.getElementById('matrix-area').getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    if (activeBar === 'x') dotRx = Math.max(0, Math.min(1, (cx-r.left)/r.width));
    if (activeBar === 'y') dotRy = Math.max(0, Math.min(1, 1-(cy-r.top)/r.height));
    updateMatrixDot();
  }
  function endDrag() { activeBar = null; }
  document.getElementById('bar-x-thumb').addEventListener('mousedown',  e => startDrag(e,'x'));
  document.getElementById('bar-y-thumb').addEventListener('mousedown',  e => startDrag(e,'y'));
  document.getElementById('bar-x-thumb').addEventListener('touchstart', e => startDrag(e,'x'), {passive:false});
  document.getElementById('bar-y-thumb').addEventListener('touchstart', e => startDrag(e,'y'), {passive:false});
  document.addEventListener('mousemove',  onMove);
  document.addEventListener('touchmove',  onMove, {passive:false});
  document.addEventListener('mouseup',    endDrag);
  document.addEventListener('touchend',   endDrag);
})();

/* ── ORG CHART ── */
let subCount = 3;
const subNames = ['部屬甲','部屬乙','部屬丙','部屬丁','部屬戊'];
const subDescs = ['說明','說明','說明','說明','說明'];

const ORG_LINE = 'rgba(37,99,235,.28)';
const VLINE_H  = 8;   // all vertical segment heights in px (uniform)

function drawOrgConnector() {
  const svg  = document.getElementById('org-connector-svg');
  const wrap = document.getElementById('sub-nodes');
  const cols = wrap.querySelectorAll('.sub-col');
  if (!cols.length) { svg.innerHTML = ''; return; }

  const svgRect  = svg.getBoundingClientRect();
  const wrapRect = wrap.getBoundingClientRect();

  // Centre X of each sub-col, relative to svg left
  const colCentres = Array.from(cols).map(c => {
    const r = c.getBoundingClientRect();
    return r.left + r.width / 2 - svgRect.left;
  });

  // Centre X of the SVG itself (where the stem from 本人 sits)
  const stemX = svgRect.width / 2;
  const hbarY = VLINE_H;               // stem goes top→hbarY
  const subVY = hbarY + VLINE_H;       // sub vlines go hbarY→subVY (same VLINE_H)
  const svgH  = subVY;

  svg.setAttribute('height', svgH);
  svg.setAttribute('viewBox', `0 0 ${svgRect.width} ${svgH}`);
  svg.innerHTML = '';

  function line(x1,y1,x2,y2) {
    const el = document.createElementNS('http://www.w3.org/2000/svg','line');
    el.setAttribute('x1',x1.toFixed(1)); el.setAttribute('y1',y1.toFixed(1));
    el.setAttribute('x2',x2.toFixed(1)); el.setAttribute('y2',y2.toFixed(1));
    el.setAttribute('stroke', ORG_LINE);
    el.setAttribute('stroke-width','1.5');
    svg.appendChild(el);
  }

  // Vertical stem from 本人 down to hbar
  line(stemX, 0, stemX, hbarY);
  // Horizontal bar across all sub-col centres
  line(colCentres[0], hbarY, colCentres[colCentres.length-1], hbarY);
  // Vertical drop from hbar down to each sub-node
  colCentres.forEach(cx => line(cx, hbarY, cx, subVY));
}

function renderSubNodes() {
  const wrap = document.getElementById('sub-nodes'); wrap.innerHTML = '';
  for (let i = 0; i < subCount; i++) {
    const col = document.createElement('div'); col.className = 'sub-col';
    col.innerHTML = `<div class="sub-node" contenteditable="true">${subNames[i]||'部屬'}</div>
      <div class="sub-node-note" contenteditable="true">${subDescs[i]||'說明'}</div>`;
    col.querySelector('.sub-node').addEventListener('blur', function() { subNames[i] = this.textContent; });
    col.querySelector('.sub-node-note').addEventListener('blur', function() { subDescs[i] = this.textContent; });
    wrap.appendChild(col);
  }
  document.getElementById('sub-count-label').textContent = subCount + ' 位部屬';
  requestAnimationFrame(drawOrgConnector);
}
function changeSubCount(d) { subCount = Math.max(1, Math.min(5, subCount+d)); renderSubNodes(); }

/* ── MATCH COLUMNS ── */
const MATCH_COLS = ['col-was','col-now','col-tobe'];
const MATCH_DATA = [
  ['專案管理','任務拆解與執行','問題解決','客戶信任度','預算控管成本意識','專案帶領與目標驅動','系統改善','內部資源協調','正向力團隊調動','團隊能力拓展'],
  ['多專案並行管理','戰略轉譯與落地','危機處理與消除','客戶關係維護','預算與成本控制','跨職能協調','流程架構優化','資源配置優先級','團隊梯隊建設','人才選育用留'],
  ['資源協調分配','願景形塑與組織文化','系統性預防排除','客戶戰略對齊','運營管理','跨組織協調折衝','變革管理與數位轉型','資源取得與調度','戰略組織設計','接班梯隊選拔育成']
];
const matchState = MATCH_DATA.map(col => col.map(t => ({text:t, color:'gray'})));

const COLOR_CLASS = {gray:'c-gray', green:'c-green', yellow:'c-yellow', red:'c-red'};
const SWATCH_CLASS = {gray:'s-gray', green:'s-green', yellow:'s-yellow', red:'s-red'};
const COLORS = ['gray','green','yellow','red'];

// close all open swatch popups
function closeSwatches(except) {
  document.querySelectorAll('.swatch-popup.open').forEach(p => { if (p !== except) p.classList.remove('open'); });
}
document.addEventListener('click', () => closeSwatches(null));

function buildMatchCol(ci) {
  const list = document.getElementById(MATCH_COLS[ci]).querySelector('.match-items');
  list.innerHTML = '';
  matchState[ci].forEach((item, i) => {
    const row = document.createElement('div'); row.className = 'match-item';

    // swatch button
    const swatch = document.createElement('div');
    swatch.className = 'light-swatch ' + COLOR_CLASS[item.color||'gray'];

    // popup with 4 color options
    const popup = document.createElement('div'); popup.className = 'swatch-popup';
    COLORS.forEach(c => {
      const opt = document.createElement('div');
      opt.className = 'swatch-opt ' + SWATCH_CLASS[c] + ((item.color||'gray') === c ? ' selected' : '');
      opt.title = c;
      opt.addEventListener('click', e => {
        e.stopPropagation();
        matchState[ci][i].color = c;
        swatch.className = 'light-swatch ' + COLOR_CLASS[c];
        popup.querySelectorAll('.swatch-opt').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        popup.classList.remove('open');
      });
      popup.appendChild(opt);
    });
    swatch.appendChild(popup);
    swatch.addEventListener('click', e => {
      e.stopPropagation();
      const isOpen = popup.classList.contains('open');
      closeSwatches(null);
      popup.classList.toggle('open', !isOpen);
    });

    const txt = document.createElement('span');
    txt.className = 'match-text'; txt.contentEditable = 'true'; txt.textContent = item.text;
    txt.addEventListener('blur', function() { matchState[ci][i].text = this.textContent; });

    row.appendChild(swatch); row.appendChild(txt);
    list.appendChild(row);
  });
}

/* ── SIDEBAR & THEME ── */
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('sidebar-overlay');
document.getElementById('settings-btn').addEventListener('click', () => {
  sidebar.classList.add('open'); overlay.classList.add('show');
});
function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
document.getElementById('sidebar-close').addEventListener('click', closeSidebar);
overlay.addEventListener('click', closeSidebar);
document.getElementById('theme-toggle').addEventListener('change', function() {
  document.documentElement.dataset.theme = this.checked ? 'dark' : 'light';
  drawRadar();
});

/* ── EXPORT ── */
document.getElementById('export-btn').addEventListener('click', () => {
  closeSidebar();

  // Sync live DOM state into actual HTML attributes before serializing,
  // since outerHTML only captures attributes -- not DOM properties like
  // a <select>'s chosen value, and not JS variables that were never
  // written back into the page's own attributes/markup.
  document.querySelectorAll('.perf-grade').forEach(sel => {
    Array.from(sel.options).forEach(opt => {
      opt.toggleAttribute('selected', opt.value === sel.value);
    });
  });

  // Bake current live state (radar values, matrix dot position, and
  // match-column swatch colors/text) back into the serialized script
  // source, so edits actually survive export/reload instead of
  // resetting to the hard-coded defaults.
  let html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  html = html.replace(
    /const radarVals = \[[^\]]*\];/,
    `const radarVals = [${radarVals.join(', ')}];`
  );
  html = html.replace(
    /let dotRx = [^,]+, dotRy = [^;]+;/,
    `let dotRx = ${dotRx}, dotRy = ${dotRy};`
  );
  html = html.replace(
    /const matchState = MATCH_DATA\.map\(col => col\.map\(t => \(\{text:t, color:'gray'\}\)\)\);/,
    `const matchState = ${JSON.stringify(matchState)};`
  );

  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([html], {type:'text/html'}));
  a.download = 'talent-dashboard.html'; a.click(); URL.revokeObjectURL(a.href);
});

document.getElementById('export-jpg-btn').addEventListener('click', () => {
  closeSidebar();
  const btn = document.getElementById('export-jpg-btn');
  btn.textContent = '擷取中…'; btn.disabled = true;

  const dark    = document.documentElement.dataset.theme === 'dark';
  const bgColor = dark ? '#0b1120' : '#E4EEFD';
  const header  = document.getElementById('page-header');
  const app     = document.getElementById('app');

  // Hide header and collapse its space so top padding matches the other three sides
  header.style.display = 'none';

  requestAnimationFrame(() => requestAnimationFrame(() => {
    html2canvas(app, {
      scale: 2,
      useCORS: true,
      backgroundColor: bgColor,
      logging: false
    }).then(canvas => {
      header.style.display = '';
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/jpeg', 0.95);
      a.download = 'talent-dashboard.jpg';
      a.click();
      btn.textContent = '匯出 JPEG 圖片'; btn.disabled = false;
    }).catch(() => {
      header.style.display = '';
      btn.textContent = '匯出 JPEG 圖片'; btn.disabled = false;
    });
  }));
});

/* ── INIT ── */
function init() {
  drawRadar();
  renderSubNodes();
  MATCH_COLS.forEach((_, i) => buildMatchCol(i));
  requestAnimationFrame(() => requestAnimationFrame(updateMatrixDot));
}
window.addEventListener('load', init);
window.addEventListener('resize', () => { updateMatrixDot(); drawOrgConnector(); });
</script>
</body>
